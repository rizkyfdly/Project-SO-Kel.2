services:

  web:
    build: .
    container_name: ukki_web

    ports:
      - "8080:80"

    depends_on:
      - db

  db:
    image: mysql:8.0

    container_name: ukki_db

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ukki_db

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d

  phpmyadmin:
    image: phpmyadmin/phpmyadmin

    container_name: ukki_phpmyadmin

    restart: always

    ports:
      - "8081:80"

    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root

    depends_on:
      - db

volumes:
  mysql_data: